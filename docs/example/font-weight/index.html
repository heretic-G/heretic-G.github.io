<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        @font-face {
            font-family: zzz;
            font-weight: 100;
            src: url("./Oxanium-ExtraLight.ttf") format('TrueType');
        }
        @font-face {
            font-family: zzz;
            font-weight: 200;
            src: url("./Oxanium-Light.ttf") format('TrueType');
        }
        @font-face {
            font-family: zzz;
            font-weight: 300;
            src: url("./Oxanium-Regular.ttf") format('TrueType');
        }
        @font-face {
            font-family: zzz;
            font-weight: 400;
            src: url("./Oxanium-Medium.ttf") format('TrueType');
        }
        @font-face {
            font-family: zzz;
            font-weight: 500;
            src: url("./Oxanium-SemiBold.ttf") format('TrueType');
        }

        @font-face {
            font-family: zzz;
            font-weight: 600;
            src: url("./Oxanium-Bold.ttf") format('TrueType');
        }
        @font-face {
            font-family: zzz;
            font-weight: 700;
            src: url("./Oxanium-ExtraBold.ttf") format('TrueType');
        }
        p {
            margin: 0;
            font-size: 40px;
        }
        .p100 {
            font-weight: 100;
        }

        .p200 {
            font-weight: 200;
        }
        .p300 {
            font-weight: 300;
        }
        .p400 {
            font-weight: 400;
        }
        .p500 {
            font-weight: 500;
        }
        .p600 {
            font-weight: 600;
        }
        .p700 {
            font-weight: 700;
        }
    </style>
</head>
<body>
<p class="p100">你好吗123qwe</p>
<p class="p200">你好吗123qwe</p>
<p class="p300">你好吗123qwe</p>
<p class="p400">你好吗123qwe</p>
<p class="p500">你好吗123qwe</p>
<p class="p600">你好吗123qwe</p>
<p class="p700">你好吗123qwe</p>

</body>
</html>
