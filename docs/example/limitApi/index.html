<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script src="./index.js"></script>
    <style>
        [data-api-loading] {
            position: relative;
            opacity: .5;
        }
        [data-api-loading]::before {
             position: absolute;
             left: 10px;
             top: 50%;
             margin-top: -10px;
             width: 20px;
             height: 20px;
             content: ' ';
             background-image: url("./loading.gif");
             background-size: 100%;
        }

        .default-btn {
            display: inline-block;
            min-width: 200px;
            height: 32px;
            padding: 0 24px;
            line-height: 32px;
            text-align: center;
            background: #F15B07;
            border-radius: 16px;
            color: #fff;
            cursor: pointer;
            transition: opacity .3s;
        }
    </style>
</head>
<body>
    <div data-limit-api class="default-btn">请求</div>
    <script>
        bindCheckApi()
        function logToBody (msg) {
            let pEl = document.createElement('p')
            pEl.innerText = msg
            document.body.append(pEl)
        }
        document.querySelector('.default-btn').addEventListener('click', function () {
            logToBody('fetch1 start')
            fetch().then(res => {
                logToBody('fetch1 end')
                logToBody('fetch2 start')
                fetch().then(res => {
                    logToBody('fetch2 end')
                })
            })
        })
    </script>
</body>
</html>
