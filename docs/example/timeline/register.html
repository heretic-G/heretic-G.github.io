<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <link rel="stylesheet" href="dist/reset.css">
    <link rel="stylesheet" href="dist/login.css">
    <title>Timeline</title>
</head>
<body>
<div class="login-con">
    <div class="login-logo-con">
        <img class="login-logo" src="./image/timeline.svg" alt="">
        <img class="login-logo-cn" src="./image/timeline-cn.svg" alt="">
        <img class="login-logo-bcg" src="./image/login-logo.svg" alt="">
    </div>
    <div class="login-form-con">
        <div class="login-form">
            <p class="login-form-title">注册</p>
            <input id="userName" class="login-form-input mar-top-28" placeholder="请输入用户名" type="text">
            <input id="password" class="login-form-input" placeholder="请输入密码" type="password">
            <input id="rePassword" class="login-form-input" placeholder="请再次输入密码" type="password">
            <span class="login-form-submit" id="register">注 册</span>
            <a class="to-register" href="/login">去登陆</a>
        </div>
    </div>
</div>
<script src="https://cdn.bootcss.com/axios/0.19.0-beta.1/axios.min.js"></script>
<script src="dist/register.js"></script>
</body>
</html>
